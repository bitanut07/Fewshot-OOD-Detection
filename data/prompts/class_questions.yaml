# =============================================================================
# Discriminative Questions for Bone X-Ray Multi-Disease Classification
# Generated by LLMWrapper (OFFLINE) — not used during training
# These questions guide description generation and help LLM produce diverse,
# disease-distinguishing visual descriptions
# =============================================================================

questions:
  - Does the bone structure maintain continuous integrity or show disruption of its outline?
  - Are fracture lines visible with angular displacement or misalignment of bone segments?
  - Are focal areas of altered opacity present within the bone matrix?
  - Does the cortical bone appear smooth and intact or irregular and interrupted?
  - Is bone density increased, decreased, or uniform compared to normal?
  - Are irregular bony outgrowths or spurs visible at bone margins?
  - Is the trabecular bone pattern coarsened, destroyed, or normally distributed?
  - Does the joint space appear preserved, narrowed, or completely lost?
  - Are cystic or lytic regions visible within the bone structure?
  - Is abnormal calcification or mineralization present in soft tissues or bone?
  - Are structural deformities present such as bowing, angulation, or collapse?
  - Does the periosteum show new bone formation or elevation along the cortex?
  - Are erosive changes visible at articular surfaces or bone ends?
  - Is expansion of the bone contour with cortical thinning present?
  - Are sclerotic areas present as regions of increased bone density?