# =============================================================================
# Discriminative Questions for Bone Tumor X-Ray Few-shot Classification
# Generated by LLMWrapper (OFFLINE) — not used during training
# These questions guide description generation and help LLM produce diverse,
# tumor-type-distinguishing visual descriptions on plain radiographs.
# =============================================================================

questions:
  - Is the lesion predominantly lytic, sclerotic, or mixed in its radiographic pattern?
  - Does the lesion show a well-defined margin with a sclerotic rim or ill-defined borders?
  - Is there cortical expansion, thinning, or complete cortical destruction?
  - Is periosteal reaction present, and if so is it smooth, spiculated, or onion-skin layered?
  - Does the lesion contain internal matrix mineralization such as ground-glass, cloud-like, or ring-and-arc calcification?
  - Is the lesion located in the epiphysis, metaphysis, or diaphysis of the bone?
  - Are there bony outgrowths projecting from the bone surface with cortical and medullary continuity?
  - Is there an expansile cystic appearance with preserved or ballooned cortical contour?
  - Are multiple calcified or ossified loose bodies visible within or around a joint space?
  - Is the trabecular architecture preserved, rarefied, or completely destroyed within the lesion?
