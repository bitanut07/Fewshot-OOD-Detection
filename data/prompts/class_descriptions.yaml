simple bone cyst:
  - Centrally located metaphyseal lucent cavity with thin cortex and smooth well-circumscribed margin
  - Unilocular lytic lesion showing mild expansion without periosteal reaction or aggressive cortical erosion
  - Homogeneous radiolucent cystic lesion in long bone with preserved surrounding trabecular architecture
