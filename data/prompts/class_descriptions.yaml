  - Tibial shaft cortical remodeling with mild anterior bowing and heterogeneous fibro-osseous internal texture

osteosarcoma:
  - Aggressive metaphyseal bone lesion with mixed lytic-sclerotic matrix and cloud-like osteoid mineralization
