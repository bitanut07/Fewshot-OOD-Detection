# -----------------------------------------------------------------------------
# Known classes (seen during training)
# -----------------------------------------------------------------------------

No Finding:
  - Uniform bone density with smooth intact cortical margins and preserved trabecular architecture throughout
  - Normal bone alignment with symmetrical joint spaces and no focal lesions or destructive changes
  - Intact bone architecture without fracture lines, erosions, or abnormal mineralization patterns
  - Regular cortical outline with no disruption or periosteal reaction along the bone surface
  - Normal opacity distribution with no areas of increased or decreased density suggesting pathology

Fracture:
  - Discontinuity in bone continuity with a visible fracture line and displacement of bone fragments
  - Cortical disruption with step-off deformity at the fracture site and abnormal fragment alignment
  - Acute fracture presenting as a dark lucent line crossing the bone with adjacent soft tissue swelling
  - Angular displacement of bone segments with disruption of the normal anatomical alignment
  - Healing fracture showing callus formation as an area of new bone bridging the fracture gap

Osteoarthritis:
  - Joint space narrowing with asymmetric loss of cartilage and osteophyte formation at joint margins
  - Subchondral sclerosis appearing as increased opacity beneath the articular surface with cystic changes
  - Irregular joint contours with flattening of condyles and marginal osteophyte proliferation
  - Deformity of articular surfaces with subchondral cyst formation visible as well-defined lucencies
  - Joint space loss with eburnation of subchondral bone and prominent marginal osteophytes

Bone Lesion:
  - Focal area of altered bone opacity within the medullary cavity with variable margin definition
  - Expansile bone lesion with cortical thinning and possible breach through the cortical shell
  - Lytic lesion appearing as a well-defined or poorly demarcated area of bone destruction
  - Matrix mineralization within the lesion producing cloud-like or stippled increased opacity
  - Cortical expansion with intact or disrupted periosteum surrounding the focal bone lesion

Osteoporosis:
  - Decreased bone mineral density with increased radiolucency and cortical thinning along bone margins
  - Vertical striations within vertebral bodies with loss of horizontal trabeculae and biconcave endplates
  - Prominent humbling of the femoral neck with reduced bone density and thin cortex
  - Generalized osteopenia with loss of normal bone opacity and pencil-thin cortical margins
  - Codfish vertebra deformity with central endplate depression and increased anteroposterior diameter

Degenerative Joint Disease:
  - Joint space narrowing with sclerosis of subchondral bone and marginal osteophyte formation
  - Subchondral cysts appearing as small lucencies adjacent to the articular surface
  - Deformity of joint contours with flattening of articular surfaces and loss of normal shape
  - Increased opacity along joint margins from osteophyte formation with preserved bone density
  - Narrowed joint space with irregular subchondral bone sclerosis and no significant osteopenia

Spondylosis:
  - Osteophyte formation along the anterior vertebral body margins with disc space narrowing
  - Endplate sclerosis adjacent to narrowed disc spaces with marginal osteophytic spurring
  - Facet joint hypertrophy with osteophyte formation reducing the size of the neural foramina
  - Loss of normal spinal curvature with degenerative changes at multiple vertebral levels
  - Anterior osteophytosis from vertebral body corners with preserved vertebral body height

Disc Degeneration:
  - Decreased intervertebral disc height with vacuum phenomenon appearing as a dark line within the disc
  - Irregular vertebral endplates with marginal osteophytosis at the adjacent vertebral corners
  - Subchondral sclerosis of vertebral endplates adjacent to the degenerated disc space
  - Narrowed disc space with no evidence of destructive bone changes or paravertebral soft tissue mass
  - Loss of disc height with sclerosis and irregularity of the opposing vertebral endplates

Spinal Stenosis:
  - Narrowing of the spinal canal diameter from hypertrophied ligamentum flavum and facet arthropathy
  - Degenerative spondylolisthesis with malalignment of vertebral bodies and canal compromise
  - Hypertrophied facet joints with osteophyte formation reducing lateral recess and foraminal dimensions
  - Thickened lamina and ossified ligamentum flavum contributing to posterior spinal canal narrowing
  - Generalized degenerative changes with severe canal stenosis and preserved vertebral body alignment

Scoliosis:
  - Lateral curvature of the spine with rotational deformity visible as asymmetric pedicle positioning
  - Compensatory curves above and below the primary scoliotic curve with Cobb angle abnormality
  - Asymmetrical rib cage appearance on dedicated spine imaging with lateral vertebral body displacement
  - Rotation of vertebral bodies within the curve with concave-side facet joint overcrowding
  - Lateral spinal deviation without congenital bony bars or segmentation anomalies in non-congenital forms

# -----------------------------------------------------------------------------
# OOD classes (NOT seen during training — used for OOD detection evaluation)
# -----------------------------------------------------------------------------

Osteomyelitis:
  - Permeative bone destruction with ill-defined lytic areas and loss of normal bone architecture
  - Periosteal new bone formation along the cortex with lifting of the periosteum from the bone surface
  - Sequestrum appearing as a dense sclerotic fragment of dead bone within the lucent infectious zone
  - Soft tissue swelling with loss of normal adjacent fat planes and ill-defined deep tissue margins
  - Mixed lytic and sclerotic changes with no sharp fracture lines or well-defined benign lesion borders

Bone Tumor:
  - Expansile bone lesion with cortical breach and soft tissue mass extension beyond bone confines
  - Moth-eaten pattern of bone destruction with ill-defined margins and aggressive periosteal reaction
  - Matrix mineralization producing cloud-like, chondroid, or stippled opacity within the tumor
  - Destructive lesion with irregular margins and absence of the smooth benign fracture callus pattern
  - Cortical destruction with large soft tissue component and no organized periosteal response

Metastatic Bone Disease:
  - Multiple focal lesions with mixed lytic and sclerotic patterns scattered across the skeleton
  - Punched-out lytic lesions without sclerotic borders appearing as lucent defects in bone
  - Dense sclerotic foci of increased opacity representing blastic metastatic deposits
  - Destructive bone lesions with loss of normal trabecular pattern and cortical involvement
  - Lesions of varying sizes and patterns with no uniform distribution across bone structures

Avascular Necrosis:
  - Flattening of the femoral head with subchondral collapse and crescent sign of impending fracture
  - Increased density of the necrotic bone fragment relative to surrounding osteopenic bone
  - Subchondral lucency termed the crescent sign indicating separation of necrotic bone from viable bone
  - Preserved joint space in early stages with no fracture line crossing through normal bone architecture
  - Sclerosis and collapse of the weight-bearing surface of the femoral head with joint space preservation

Paget Disease:
  - Thickened cortex with enlarged bone dimensions and coarsened trabecular pattern
  - Mixed lytic and blastic phases appearing as both lucency and sclerosis within the same bone
  - Cotton-wool appearance of the skull vault with thickened diploic space in advanced cranial involvement
  - Anterior tibial bowing with characteristic saber-shin deformity and increased bone dimensions
  - Looser zones appearing as transverse lucencies adjacent to dense sclerotic bone regions
