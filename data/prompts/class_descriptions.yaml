  - Subarticular osteolysis with eccentric growth and thinning of surrounding cortical shell
  - Expansile epimetaphyseal defect with trabecular rarefaction and no chondroid ring-like calcifications

osteochondroma:
  - Pedunculated bony outgrowth arising from metaphysis with cortical and medullary continuity to the parent bone
  - Sessile exophytic lesion projecting away from the nearest joint with preserved host bone trabecular pattern
  - Osseous protrusion with smooth cortex and marrow continuity indicating a benign cartilage-capped exostosis
  - Metaphyseal bony spur-like mass with broad base and no aggressive periosteal reaction or cortical destruction
  - Mature bone outgrowth showing continuous cortex with parent bone and no permeative lytic change
  - Exostotic lesion with uniform mineralized stalk and preserved native cortical integrity of adjacent bone
  - Benign metaphyseal osseous projection with uninterrupted marrow canal from host bone into lesion
  - Outward-growing cortical excrescence with smooth contour and absence of destructive internal lucent foci

osteofibroma:
  - Intracortical lucent lesion in tibial shaft with surrounding sclerosis and cortical expansion
  - Mixed lytic-sclerotic cortical lesion with fusiform bone contour widening and intact periosteal margin
  - Well-demarcated cortical defect containing ground-glass opacity and reactive sclerotic border
