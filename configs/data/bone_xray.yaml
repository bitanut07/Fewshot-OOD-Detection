# Bone X-Ray Dataset Configuration (BTXRD + FracAtlas)
dataset_type: "bone_xray"
data:
  dataset_name: "bone_xray"
  data_root: "data/processed/bone_xray"
  image_dir: "images"
  num_classes: 8
  num_known_classes: 6
  num_ood_classes: 2
  image_size: 224
  # OpenAI CLIP / open_clip (aligns with reference ViT-B/16 INPUT.PIXEL_*)
  image_mean: [0.48145466, 0.4578275, 0.40821073]
  image_std: [0.26862954, 0.26130258, 0.27577711]
  class_names:
    - "giant cell tumor"
    - "osteochondroma"
    - "osteofibroma"
    - "osteosarcoma"
    - "simple bone cyst"
    - "synovial osteochondroma"
    - "no_tumor"
    - "fractured"

  id_classes: [0, 1, 2, 3, 4, 5]
  ood_classes: [6, 7]
  train_split_file: "data/splits/bone_xray_train.txt"
  val_split_file: "data/splits/bone_xray_val.txt"
  test_split_file: "data/splits/bone_xray_test.txt"
  augmentation:
    train:
      random_resized_crop: true
      random_horizontal_flip: true
      color_jitter: false
      normalize: true
      random_rotation: 10
    val:
      resize: 256
      center_crop: 224
      normalize: true
  cache_images: false
  num_workers: 4
  pin_memory: true
