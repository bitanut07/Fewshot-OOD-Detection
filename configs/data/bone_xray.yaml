# Bone X-Ray Dataset Configuration
dataset_type: "bone_xray"
data:
  dataset_name: "bone_xray"
  data_root: "data/processed/bone_xray"
  image_dir: "images"
  num_classes: 15
  num_known_classes: 10
  num_ood_classes: 5
  image_size: 224
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  class_names:
    - "giant cell tumor"
    - "osteochondroma"
    - "osteofibroma"
    - "osteosarcoma"
    - "simple bone cyst"
    - "synovial osteochondroma"
    - "no_tumor"
    - "fractured"

  id_classes: [0, 1, 2, 3, 4, 5]
  ood_classes: [6, 7]
  train_split_file: "data/splits/bone_xray_train.txt"
  val_split_file: "data/splits/bone_xray_val.txt"
  test_split_file: "data/splits/bone_xray_test.txt"
  augmentation:
    train:
      random_resized_crop: true
      random_horizontal_flip: true
      color_jitter: false
      normalize: true
      random_rotation: 10
    val:
      resize: 256
      center_crop: 224
      normalize: true
  cache_images: false
  num_workers: 4
  pin_memory: true
