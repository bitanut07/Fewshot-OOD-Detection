# =============================================================================
# CLIP ViT-B/16 (open_clip) Configuration
# =============================================================================

model:
  clip:
    # Backbone aliases (ViT-B/16, ViT-B-16) resolve to the same OpenAI public checkpoint when pretrained is openai_public.
    backbone: "ViT-B-16"
    # openai = open_clip hub tag; openai_public = download ViT-B-16.pt from OpenAI Azure (glali _MODELS URL) then load via open_clip
    pretrained: "openai_public"
    freeze: true
    weight_cache_dir: null

    # Return local per-patch features (projected to text embedding space)
    return_local_features: true
    return_global_feature: true

    # Input settings (should match dataset transforms)
    image_size: 224
    patch_size: 16

    # Embedding dims after projection (global + local)
    embed_dim: 512
    local_feat_dim: 512
    num_patches: 196  # (224/16)^2

