# =============================================================================
# LLM Configuration (offline description generation)
# Low temperature for stable, deterministic medical descriptions
# =============================================================================

model:
  llm:
    model_name: "Qwen/Qwen2.5-7B-Instruct"
    device_map: "auto"
    torch_dtype: "float16"
    max_new_tokens: 768
    temperature: 0.3
    top_p: 0.85
    repetition_penalty: 1.15
    cache_dir: null
    freeze: true
    trust_remote_code: true
