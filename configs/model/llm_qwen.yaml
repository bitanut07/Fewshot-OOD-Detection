# LLM for disease description generation
model_type: "llm_wrapper"

llm:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  device_map: "auto"
  torch_dtype: "float16"
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  cache_dir: null
  freeze: true
  trust_remote_code: true

alternatives:
  qwen_3b:
    model_name: "Qwen/Qwen2.5-3B-Instruct"
  llama_7b:
    model_name: "meta-llama/Llama-2-7b-chat-hf"
