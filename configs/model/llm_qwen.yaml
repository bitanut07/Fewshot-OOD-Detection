# =============================================================================
# LLM Configuration (offline description generation)
# =============================================================================

model:
  llm:
    model_name: "Qwen/Qwen2.5-7B-Instruct"
    device_map: "auto"
    torch_dtype: "float16"
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    repetition_penalty: 1.1
    cache_dir: null
    freeze: true
    trust_remote_code: true

