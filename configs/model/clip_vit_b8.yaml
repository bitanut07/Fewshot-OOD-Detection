# =============================================================================
# CLIP ViT-B/8 (open_clip) Configuration
# =============================================================================

model:
  clip:
    # open_clip naming uses "ViT-B-8" (we also accept "ViT-B/8" in code)
    backbone: "ViT-B-8"
    pretrained: "openai"
    freeze: true

    # Return local per-patch features (projected to text embedding space)
    return_local_features: true
    return_global_feature: true

    # Input settings (should match dataset transforms)
    image_size: 224
    patch_size: 8

    # Embedding dims after projection (global + local)
    embed_dim: 512
    local_feat_dim: 512
    num_patches: 64  # (224/8)^2

