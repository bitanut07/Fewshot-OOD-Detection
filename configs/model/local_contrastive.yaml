# =============================================================================
# Local Contrastive Learning Module Configuration
# =============================================================================

model:
  local_contrastive:
    temperature: 0.1
    top_k: 4
    bottom_k: 4
    trainable: true

  # Region selector config lives alongside local contrastive by default
  local_region_selector:
    top_k: 4
    bottom_k: 4
    similarity_metric: "cosine"
    normalize_before_sim: true
    aggregate_method: "mean"

