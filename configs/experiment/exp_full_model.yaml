# Full Model: CLIP + LLM Descriptions + Text Refinement + Local Contrastive + Global-Local Alignment
includes: ["default.yaml", "model/clip_vit_b16.yaml", "model/llm_qwen.yaml", "model/text_refiner.yaml", "model/local_contrastive.yaml", "model/alignment.yaml", "data/bone_xray.yaml", "train/fewshot_1shot.yaml"]
experiment_name: "full_model"
llm_descriptions:
  num_descriptions_per_class: 5
  use_template_prompt: true
model:
  text_refiner:
    trainable: true
    alpha: 0.5
    num_layers: 2
  local_contrastive:
    trainable: true
    top_k: 4
    bottom_k: 4
    temperature: 0.1
  alignment:
    alpha_global: 0.5
    alpha_local: 0.5
    learnable_weights: false
loss:
  classification:
    weight: 1.0
  global_alignment:
    weight: 1.0
  local_alignment:
    weight: 1.0
  local_contrastive:
    weight: 0.5
  text_refinement:
    weight: 0.1
