# =============================================================================
# Default Configuration for GLOCAL-FSL-OOD
# Optimized for BTXRD Bone X-ray | Few-shot (k=1) + OOD Detection
# =============================================================================

# =============================================================================
# LLM Configuration (OFFLINE description generation only)
# Low temperature + constrained top_p → stable, deterministic medical text
# =============================================================================
model:
  llm:
    # Backend selection
    use_local_llm: true                 # false → API (no local weights)
    cleanup_cache: false                # set true in cloud configs to free disk
    # Local backend
    model_name: "Qwen/Qwen2.5-7B-Instruct"
    device_map: "auto"
    torch_dtype: "float16"
    quantization: null                  # "4bit" | "8bit" | null
    low_cpu_mem_usage: true
    cache_dir: "/tmp/hf-cache-fewshot-ood"
    trust_remote_code: true
    freeze: true
    # Generation params
    max_new_tokens: 768
    temperature: 0.3
    top_p: 0.85
    do_sample: true
    repetition_penalty: 1.15
    # API fallback
    api:
      provider: "openai"
      model_name: "gpt-4o-mini"
      api_key_env: "OPENAI_API_KEY"
      base_url: null
      timeout: 60.0

  # CLIP vision+text (open_clip). ``openai_public`` = same Azure .pt URLs + SHA check as glali/clip_w_local/clip.py
  clip:
    backbone: "ViT-B/16"
    pretrained: "openai_public"
    freeze: true
    # Optional; default: env CLIP_OPENAI_CACHE or ~/.cache/clip
    weight_cache_dir: null

# =============================================================================
# LLM Description Generation Configuration (OFFLINE)
# =============================================================================
llm_descriptions:
  enabled: true

  num_questions: 10
  num_descriptions_per_class: 8

  # Domain context — NO OOD class names leaked; kept general for prompt safety
  dataset_description: >
    A bone X-ray image dataset for few-shot classification and OOD detection
    of bone tumor types. The dataset contains radiographic images of various
    bone tumors and lesions captured from standard clinical X-ray imaging.
    Classification targets include benign and malignant bone tumors with
    distinct radiographic appearances. The model must distinguish tumor types
    based solely on visible structural and density features in X-ray images.

  # Prompt template for generating discriminative questions
  question_prompt_template: |
    You are a musculoskeletal radiologist specializing in bone tumor X-ray analysis.

    Dataset description:
    {dataset_description}

    Task:
    Generate {num_questions} diagnostic questions that help distinguish between
    different bone tumor types in X-ray images.

    Requirements:
    - Focus ONLY on features visible in plain radiographs
    - Do NOT mention clinical symptoms (pain, fever, swelling, etc.)
    - Do NOT mention patient demographics, history, or lab results
    - Questions must target visually discriminative radiographic signs
    - Avoid referring to specific absolute positions (left/right/top/bottom)

    Focus on:
    - lesion morphology (lytic, sclerotic, mixed, expansile)
    - cortical integrity (intact, thinned, breached, destroyed)
    - periosteal reaction pattern (none, smooth, spiculated, Codman triangle)
    - matrix mineralization (absent, ground-glass, cloud-like, ring-arc)
    - bone contour changes (expansion, deformity, outgrowth)
    - margin characteristics (well-defined, ill-defined, sclerotic rim)
    - trabecular pattern (preserved, rarefied, destroyed)
    - intra/extra-osseous extension and soft tissue involvement

    Output:
    - One question per line
    - No numbering
    - No explanations

  # Prompt template for generating descriptions per class
  description_prompt_template: |
    You are a musculoskeletal radiologist specializing in bone tumor X-ray interpretation.

    Target bone tumor class: "{class_name}"

    {questions_block}

    Task:
    Generate {num_descriptions} diverse and radiographically accurate visual descriptions
    of this bone tumor as seen in plain X-ray images.

    Strict requirements:
    - Each description must be exactly ONE sentence
    - Describe ONLY features visible on plain radiographs
    - Do NOT mention clinical symptoms (pain, tenderness, swelling, etc.)
    - Do NOT mention patient history, age, gender, or lab results
    - Do NOT use uncertainty hedging ("may", "possibly", "sometimes")
    - Do NOT use absolute spatial terms (left/right/top/bottom)
    - Each description MUST highlight a distinct radiographic feature
    - Descriptions must be visually discriminative from other tumor types
    - Use precise radiological terminology

    Focus on:
    - lesion location within the bone (epiphysis, metaphysis, diaphysis)
    - lesion pattern (lytic, sclerotic, mixed, geographic, permeative, moth-eaten)
    - cortical changes (thinning, expansion, breach, destruction)
    - periosteal reaction (lamellated, sunburst, Codman triangle, none)
    - matrix pattern (osteoid, chondroid, ground-glass, absent)
    - margin definition (sharp, sclerotic rim, ill-defined)
    - bone contour and trabecular architecture changes
    - soft tissue component presence

    Output:
    - One description per line
    - No numbering
    - No explanations

  default_prompts:
    questions: |
      You are a musculoskeletal radiologist. Generate {num_questions} diagnostic questions
      about bone tumor X-ray findings. Focus on visible radiographic features only.
      Output one per line, no numbering.
    descriptions: |
      Generate {num_descriptions} radiographic descriptions for the bone tumor: "{class_name}".
      Focus on visible X-ray features only. One sentence per description, one per line.

  use_template_prompt: true

  # Output files
  output_file: "data/prompts/class_descriptions.yaml"
  questions_output_file: "data/prompts/class_questions.yaml"
  # Secondary JSON descriptions path (YAML is preferred when present)
  descriptions_json_file: "data/prompts/class_descriptions.json"

  generation_batch_size: 1
  cache_generated: true

# =============================================================================
# Model Module Configuration
# =============================================================================
model_type: "glocal_fsl_ood"

text_refiner:
  text_dim: 512
  visual_dim: 512
  hidden_dim: 512
  num_heads: 8
  num_layers: 2
  dropout: 0.1
  alpha: 0.5
  trainable: true

local_contrastive:
  temperature: 0.1
  top_k: 4
  bottom_k: 4
  use_cosine_similarity: true
  normalize_embeddings: true
  contrastive_mode: "supervised"
  # batch_size=4, n_way=6, k_shot=1 → effective negatives per anchor
  num_negatives: 5
  trainable: true
  use_momentum_prototype: false
  momentum: 0.999
  sim_min: -1.0
  sim_max: 1.0

local_region_selector:
  score_dim: 512
  selection_mode: "similarity"
  top_k: 4
  bottom_k: 4
  normalize_scores: true
  trainable: true

alignment:
  alpha_global: 0.5
  alpha_local: 0.5
  normalize_logits: true
  use_softmax: true
  logit_mode: "weighted_sum"
  logit_temperature: 1.0
  learnable_weights: false
  text_embed_dim: 512
  image_global_dim: 512
  image_local_dim: 512

# =============================================================================
# Loss Weights
# =============================================================================
loss:
  classification:
    weight: 1.0
  global_alignment:
    weight: 1.0
  local_alignment:
    weight: 1.0
  local_contrastive:
    weight: 0.5
  text_refinement:
    weight: 0.1
  # Glali-style OOD entropy regularization over non-top-K local patches
  ood_reg:
    weight: 0.25
  # Teacher-student distillation weights (set >0 only when teacher encoder is on)
  distill_img:
    weight: 10.0
  distill_text:
    weight: 0.0

# =============================================================================
# Training Configuration
# Matches glali LocProto recipe: SGD + cosine LR + 200 epochs + batch 32
# =============================================================================
train:
  epochs: 200
  batch_size: 32
  optimizer:
    type: "sgd"
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 200
    eta_min: 0.000001
  warmup_epochs: 1
  warmup_cons_lr: 0.00001
  grad_clip: 1.0
  mixed_precision: true
  ema: false
  ema_decay: 0.999
  # Early stopping: stop training when val metric does not improve for
  # ``early_stopping_patience`` consecutive evaluation epochs.
  # Set to 0 to disable.
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0001
  # Checkpointing — disk-efficient defaults for small-disk GPU cloud:
  #   only best.pt + last.pt are kept (both overwritten in place)
  save_best: true
  keep_only_best: true

fewshot:
  n_way: 6
  k_shot: 1
  n_query: 15

# =============================================================================
# Evaluation Configuration
# =============================================================================
eval:
  checkpoint_path: null
  save_predictions: true

# Percentile-based threshold adapts to score distribution per run
ood:
  method: "msp"
  threshold_strategy: "percentile"
  percentile: 95
  # Top-k for entropy regularization on patch scores (non-GT top-k mass → uniform)
  topk: 50
  temperature: 1.0

# =============================================================================
# Experiment / IO paths
# =============================================================================
experiment:
  seed: 42
  deterministic: false
  name: "default"

paths:
  output_dir: "outputs/runs"
  log_dir: "outputs/logs"
  tb_dir: "outputs/tensorboard"
  checkpoint_dir: null
  data_root: "data/processed/image_processing"

logging:
  level: "INFO"

# =============================================================================
# Data defaults
# =============================================================================
data:
  manifest_file: "data/processed/data_processing/manifest.csv"
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 4
  pin_memory: true
  # Match open_clip / CLIP preprocessing (224 RGB)
  image_mean: [0.48145466, 0.4578275, 0.40821073]
  image_std: [0.26862954, 0.26130258, 0.27577711]
