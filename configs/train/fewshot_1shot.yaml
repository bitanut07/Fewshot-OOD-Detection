# Few-shot 1-shot config
experiment_name: "fsl_1shot"
fewshot:
  n_way: 5
  k_shot: 1
  n_query: 15
  episodes_per_epoch: 200
  num_episodes_train: 200
  num_episodes_val: 50
  num_episodes_test: 100
train:
  epochs: 150
  batch_size: 4
  optimizer:
    type: "AdamW"
    lr: 0.0002
    weight_decay: 0.01
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 150
    eta_min: 0.000001
  warmup_epochs: 10
loss:
  local_contrastive:
    weight: 0.8
  text_refinement:
    weight: 0.15