# Few-shot 8-shot config
experiment_name: "fsl_8shot"
fewshot:
  n_way: 5
  k_shot: 8
  n_query: 15
  episodes_per_epoch: 60
  num_episodes_train: 60
  num_episodes_val: 50
  num_episodes_test: 100
train:
  epochs: 80
  batch_size: 16
  optimizer:
    type: "AdamW"
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 80
    eta_min: 0.000001
  warmup_epochs: 3
loss:
  local_contrastive:
    weight: 0.3
  text_refinement:
    weight: 0.05
