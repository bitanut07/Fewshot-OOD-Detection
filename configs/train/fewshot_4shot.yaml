# Few-shot 4-shot config
experiment_name: "fsl_4shot"
fewshot:
  n_way: 5
  k_shot: 4
  n_query: 15
  episodes_per_epoch: 100
  num_episodes_train: 100
  num_episodes_val: 50
  num_episodes_test: 100
train:
  epochs: 100
  batch_size: 8
  optimizer:
    type: "AdamW"
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 100
    eta_min: 0.000001
  warmup_epochs: 5
loss:
  local_contrastive:
    weight: 0.5
  text_refinement:
    weight: 0.1
