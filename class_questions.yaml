questions:
- Margin shows a clear sclerotic border versus an irregular margin without sclerosis?
- Cortical integrity is preserved versus thinned and partially breached?
- Growth pattern is expansive with destruction of the cortex versus contained within
  the medullary cavity?
- Tumor presents as a single lesion versus multiple discrete foci?
- Lytic component predominates over sclerotic changes versus vice versa?
- Sclerosis around the lesion is prominent versus minimal?
